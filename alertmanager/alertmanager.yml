---
global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_WEBHOOK_URL}"

route:
  receiver: slack-warnings  # default catch-all
  group_by: [alertname, instance]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 24h
  routes:
    - matchers:
        - severity = critical
      receiver: pagerduty-critical
      group_wait: 15s
      repeat_interval: 4h
      continue: true  # criticals also land in Slack for visibility
    - matchers:
        - severity = critical
      receiver: slack-critical
    - matchers:
        - severity = warning
      receiver: slack-warnings

receivers:
  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key: "${PAGERDUTY_ROUTING_KEY}"
        severity: critical
        description: "{{ .CommonAnnotations.summary }}"

  - name: slack-critical
    slack_configs:
      - channel: "#alerts-critical"
        send_resolved: true
        title: "[CRITICAL] {{ .CommonLabels.alertname }}"
        text: >-
          {{ range .Alerts }}*{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}

  - name: slack-warnings
    slack_configs:
      - channel: "#alerts"
        send_resolved: true
        title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
        text: >-
          {{ range .Alerts }}*{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}

inhibit_rules:
  # A firing critical alert silences the warning version on the same instance.
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: [alertname, instance]
