---
groups:
  - name: application.http
    rules:
      - alert: HighHTTP5xxRate
        expr: |
          sum by (job) (rate(http_requests_total{status=~"5.."}[5m]))
            /
          sum by (job) (rate(http_requests_total[5m]))
            > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx rate on {{ $labels.job }}"
          description: "{{ $value | humanizePercentage }} of requests are failing with 5xx over the last 5 minutes."

      - alert: HighLatencyP99
        expr: |
          histogram_quantile(0.99,
            sum by (job, le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "p99 latency above 1s on {{ $labels.job }}"
          description: "99th percentile request latency is {{ $value | printf \"%.2f\" }}s for 10 minutes."

      - alert: EndpointDown
        expr: probe_success{job="blackbox-http"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Endpoint {{ $labels.instance }} failing probes"
          description: "Blackbox HTTP probe has failed for 3 minutes."

      - alert: EndpointSlowProbe
        expr: probe_duration_seconds{job="blackbox-http"} > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Endpoint {{ $labels.instance }} responds slowly"
          description: "Probe duration is {{ $value | printf \"%.2f\" }}s (threshold 2s) for 10 minutes."
